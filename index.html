<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
</head>
<body>
  <h1>ماشین حساب من</h1>
  <input id="adad1" type="number" placeholder="عدد اول">
  <input id="adad2" type="number" placeholder="عدد دوم">
  <br><br>
  <button onclick="jam()">+</button>
  <button onclick="tafrigh()">-</button>
  <button onclick="zarb()">×</button>
  <button onclick="taghsim()">÷</button>
  <h2 id="natije">نتیجه: ؟</h2>

  <script>
    function jam() {
      let a = Number(document.getElementById("adad1").value);
      let b = Number(document.getElementById("adad2").value);
      document.getElementById("natije").innerHTML = "نتیجه: " + (a + b);
    }
    function tafrigh() {
      let a = Number(document.getElementById("adad1").value);
      let b = Number(document.getElementById("adad2").value);
      document.getElementById("natije").innerHTML = "نتیجه: " + (a - b);
    }
    function zarb() {
      let a = Number(document.getElementById("adad1").value);
      let b = Number(document.getElementById("adad2").value);
      document.getElementById("natije").innerHTML = "نتیجه: " + (a * b);
    }
    function taghsim() {
      let a = Number(document.getElementById("adad1").value);
      let b = Number(document.getElementById("adad2").value);
      document.getElementById("natije").innerHTML = "نتیجه: " + (a / b);
    }
  </script>
</body>
</html>
